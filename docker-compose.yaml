services:
  # Messaging Layer
  kafka:
    image: bitnami/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft configuration
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # Listeners for internal and external communication
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      # Topic replication and data retention
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_LOG_RETENTION_HOURS=24
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/29092'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - pipeline-net

  # Processing Layer: Master node
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java17
    container_name: flink-jobmanager
    restart: unless-stopped
    ports:
      - "8081:8081"
    command: jobmanager
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8081'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      # RPC address for TaskManager connection
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    networks:
      - pipeline-net

  # Processing Layer: Worker node
  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java17
    container_name: flink-taskmanager
    restart: unless-stopped
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      # Connect to JobManager and configure task slots
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    networks:
      - pipeline-net

  # Persistence Layer
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      # Run as single node and disable security for development
      - discovery.type=single-node
      - xpack.security.enabled=false
      # JVM memory limits
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9200'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - pipeline-net

  # Visualization Layer
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5601'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pipeline-net

# Network setup
networks:
  pipeline-net:
    driver: bridge

# Persistent volumes setup
volumes:
  kafka_data:
  es_data: