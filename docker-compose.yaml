# Stack de mensajeria: kafka (KRaft) + kafka-init (one-shot topics) + kafka-ui
# docker compose up -d levanta todo sin pasos manuales (R2.1)
#
# Nota: en ago-2025 Bitnami movio sus imagenes a 'bitnamilegacy/'.
# bitnami/kafka:latest ya no existe — usamos bitnamilegacy/kafka:3.7 pinned.

services:

  # Kafka 3.7 KRaft — un solo nodo hace de broker y controller
  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"   # clientes externos (productores Python)
      - "9094:9094"   # red interna de Docker
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # INTERNAL=entre contenedores, EXTERNAL=fuera de Docker, CONTROLLER=KRaft
      KAFKA_CFG_LISTENERS: INTERNAL://:9094,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9094,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1

      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9094 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - streaming-net
      
  # Flink SQL Aggregation Job - automatic submitter
  flink-aggregation-job:
    image: volgatrace-flink:1.18.1
    container_name: flink-aggregation-job
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8081
    volumes:
      - ./flink:/opt/flink/usrlib
    command:
      - /bin/bash
      - -c
      - |
        echo "Waiting for Flink and Kafka to be ready..."
        sleep 20
        echo "Submitting Flink aggregation SQL job..."
        ./bin/sql-client.sh \
          -Drest.address=flink-jobmanager \
          -Drest.port=8081 \
          -f /opt/flink/usrlib/aggregation.sql
    networks:
      - streaming-net

  # one-shot: crea los topics y termina
  kafka-init:
    image: bitnamilegacy/kafka:3.7
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    environment:
      # Lista de topics como "nombre:particiones:retencion_ms"
      TOPICS: >-
        transactions-online:3:86400000
        transactions-pos:3:86400000
        transactions-aggregated:3:86400000
        alerts:3:86400000
        transactions-dlq:3:86400000
      BOOTSTRAP: kafka:9094
      REPLICATION: "1"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo ">> kafka-init: creando topics en $${BOOTSTRAP}..."
        for entry in $${TOPICS}; do
          IFS=':' read -r topic partitions retention <<< "$${entry}"
          echo "   -> $${topic} (particiones=$${partitions}, retencion=$${retention}ms)"
          kafka-topics.sh \
            --bootstrap-server "$${BOOTSTRAP}" \
            --create \
            --if-not-exists \
            --topic "$${topic}" \
            --partitions "$${partitions}" \
            --replication-factor "$${REPLICATION}" \
            --config "retention.ms=$${retention}" \
            --config "cleanup.policy=delete"
        done
        echo ""
        echo ">> Topics existentes:"
        kafka-topics.sh --bootstrap-server "$${BOOTSTRAP}" --list
        echo ""
        echo ">> kafka-init: completado. Saliendo."
    networks:
      - streaming-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: streaming-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - streaming-net


  # Processing Layer: Master node
  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    image: volgatrace-flink:1.18.1
    container_name: flink-jobmanager
    restart: unless-stopped
    ports:
      - "8081:8081"
    command: jobmanager
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8081'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      # RPC address for TaskManager connection
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./flink:/opt/flink/usrlib
    networks:
      - streaming-net

  # Processing Layer: Worker node
  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    image: volgatrace-flink:1.18.1
    container_name: flink-taskmanager
    restart: unless-stopped
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      # Connect to JobManager and configure task slots
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    networks:
      - streaming-net

  # Persistence Layer
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      # Run as single node and disable security for development
      - discovery.type=single-node
      - xpack.security.enabled=false
      # JVM memory limits
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9200'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - kafka_data:/usr/share/elasticsearch/data
    networks:
      - streaming-net

  # Visualization Layer
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5601'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - streaming-net

volumes:
  kafka_data:
    driver: local

networks:
  streaming-net:
    driver: bridge
    name: streaming-net